name: ubuntu-build

on: 
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        arch: [x86_64, aarch64]
    
    concurrency:
        group: ${{ github.ref }}-${{ github.base_ref }}-${{ github.head_ref }}-Ubuntu-${{ matrix.arch }}
        cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4        

      - name: Cache packages
        id: cache-xmake-ubuntu
        uses: actions/cache@v4
        env:
          cache-name: cache-node-modules
        with:
          path: ~/.xmake
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: 3.0.8
          actions-cache-folder: '.xmake-cache'
          actions-cache-key: 'ubuntu'

      - name: config
        run: |
          xmake f -c -y -vD --mqtt=y

      - name: build_rest_server
        run: |
          xmake -bvD rest_server

      - name: build_node_server
        run: |
          xmake -bvD node_server

      - name: build_websocket_server
        run: |
          xmake -bvD websocket_server

      - name: build_mqtt_broker
        run: |
          xmake -bvD mqtt_broker   
