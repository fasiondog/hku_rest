# Prometheus 配置文件示例
# 用于监控 hku_rest HTTP 服务器

global:
  scrape_interval: 15s  # 默认抓取间隔
  evaluation_interval: 15s  # 规则评估间隔

# 告警配置（可选）
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
      # - localhost:9093

# 加载规则（可选）
rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

# 抓取配置
scrape_configs:
  # Prometheus 自监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # hku_rest HTTP 服务器监控
  - job_name: 'hku_rest'
    static_configs:
      - targets: ['localhost:8080']
    metrics_path: '/metrics'
    
    # 可选：添加标签
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'hku-rest-server'
    
    # 指标重命名（可选）
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'hku_http_(.*)'
        target_label: __name__
        replacement: 'hku_rest_$1'

  # 如果你想监控其他服务，可以添加更多 job
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['localhost:9100']
