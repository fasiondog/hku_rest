# MQTT Broker 示例配置

# MQTT TCP 端口（必需）
mqtt_port=1883

# WebSocket 端口（可选）
# ws_port=8083

# TLS 端口（可选，需要证书配置）
# tls_port=8883
# certificate=server.crt
# private_key=server.key
# verify_field=CN

# io_context 配置
iocs=0
threads_per_ioc=1

# 性能优化
tcp_no_delay=true
bulk_write=true
read_buf_size=65536

# 认证文件（可选）
# auth_file=auth.json

# 其他选项
# recycling_allocator=false
# recv_buf_size=65536
# send_buf_size=65536
