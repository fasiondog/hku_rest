<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSE Test Client</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .control-panel {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .btn-connect {
            background: #667eea;
            color: white;
        }
        
        .btn-connect:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }
        
        .btn-disconnect {
            background: #e74c3c;
            color: white;
        }
        
        .btn-disconnect:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }
        
        .btn-clear {
            background: #95a5a6;
            color: white;
        }
        
        .btn-clear:hover {
            background: #7f8c8d;
        }
        
        .status {
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
            text-align: center;
        }
        
        .status.connected {
            background: #2ecc71;
            color: white;
        }
        
        .status.disconnected {
            background: #e74c3c;
            color: white;
        }
        
        .status.connecting {
            background: #f39c12;
            color: white;
        }
        
        .message-panel {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-height: 600px;
            overflow-y: auto;
        }
        
        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #ecf0f1;
        }
        
        .message-count {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }
        
        .message {
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
            background: #f8f9fa;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .message.event-connected {
            border-left-color: #2ecc71;
            background: #e8f8f5;
        }
        
        .message.event-quote {
            border-left-color: #3498db;
            background: #ebf5fb;
        }
        
        .message.event-completed {
            border-left-color: #9b59b6;
            background: #f5eef8;
        }
        
        .message-id {
            font-size: 12px;
            color: #7f8c8d;
            margin-bottom: 5px;
        }
        
        .message-event {
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        
        .message-data {
            font-family: 'Courier New', monospace;
            background: #2c3e50;
            color: #ecf0f1;
            padding: 10px;
            border-radius: 3px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .quote-info {
            margin-top: 10px;
            padding: 10px;
            background: white;
            border-radius: 3px;
            font-size: 18px;
            font-weight: bold;
        }
        
        .quote-up {
            color: #27ae60;
        }
        
        .quote-down {
            color: #e74c3c;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 SSE Test Client</h1>
        
        <div class="control-panel">
            <div class="button-group">
                <button class="btn-connect" onclick="connectSimple()">Connect Simple</button>
                <button class="btn-connect" onclick="connectStream()">Connect Stream</button>
                <button class="btn-disconnect" onclick="disconnect()">Disconnect</button>
                <button class="btn-clear" onclick="clearMessages()">Clear Messages</button>
            </div>
            <div id="status" class="status disconnected">Disconnected</div>
        </div>
        
        <div class="message-panel">
            <div class="message-header">
                <h2>Messages</h2>
                <span class="message-count" id="messageCount">0</span>
            </div>
            <div id="messages"></div>
        </div>
    </div>

    <script>
        let eventSource = null;
        let messageCount = 0;

        function updateStatus(status, className) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = status;
            statusEl.className = 'status ' + className;
        }

        function addMessage(eventType, data, id) {
            messageCount++;
            document.getElementById('messageCount').textContent = messageCount;

            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            
            if (eventType) {
                messageDiv.classList.add('event-' + eventType);
            }

            let html = '';
            if (id) {
                html += `<div class="message-id">ID: ${id}</div>`;
            }
            if (eventType) {
                html += `<div class="message-event">Event: ${eventType}</div>`;
            }
            
            // 尝试解析 JSON
            let displayData = data;
            let quoteInfo = '';
            try {
                const jsonData = JSON.parse(data);
                displayData = JSON.stringify(jsonData, null, 2);
                
                // 如果是行情数据，显示格式化信息
                if (eventType === 'quote' && jsonData.symbol) {
                    const changeClass = jsonData.change >= 0 ? 'quote-up' : 'quote-down';
                    const changeSign = jsonData.change >= 0 ? '+' : '';
                    quoteInfo = `
                        <div class="quote-info">
                            📈 ${jsonData.symbol}: $${jsonData.price.toFixed(2)} 
                            <span class="${changeClass}">(${changeSign}${jsonData.change.toFixed(2)})</span>
                        </div>
                    `;
                }
            } catch (e) {
                // 不是 JSON，直接显示
            }
            
            html += `<div class="message-data">${escapeHtml(displayData)}</div>`;
            html += quoteInfo;
            
            messageDiv.innerHTML = html;
            messagesDiv.insertBefore(messageDiv, messagesDiv.firstChild);
            
            // 限制消息数量
            while (messagesDiv.children.length > 100) {
                messagesDiv.removeChild(messagesDiv.lastChild);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function connectSimple() {
            disconnect();
            updateStatus('Connecting...', 'connecting');
            
            eventSource = new EventSource('http://localhost:8081/sse/simple');
            
            eventSource.onmessage = function(event) {
                addMessage(null, event.data, null);
            };
            
            eventSource.onopen = function() {
                updateStatus('Connected (Simple)', 'connected');
            };
            
            eventSource.onerror = function(error) {
                console.error('SSE Error:', error);
                updateStatus('Error', 'disconnected');
                eventSource.close();
            };
        }

        function connectStream() {
            disconnect();
            updateStatus('Connecting...', 'connecting');
            
            eventSource = new EventSource('http://localhost:8081/sse/stream');
            
            eventSource.addEventListener('connected', function(event) {
                addMessage('connected', event.data, null);
            });
            
            eventSource.addEventListener('quote', function(event) {
                addMessage('quote', event.data, event.lastEventId);
            });
            
            eventSource.addEventListener('completed', function(event) {
                addMessage('completed', event.data, event.lastEventId);
                setTimeout(() => disconnect(), 1000);
            });
            
            eventSource.onopen = function() {
                updateStatus('Connected (Stream)', 'connected');
            };
            
            eventSource.onerror = function(error) {
                console.error('SSE Error:', error);
                updateStatus('Error', 'disconnected');
                eventSource.close();
            };
        }

        function disconnect() {
            if (eventSource) {
                eventSource.close();
                eventSource = null;
                updateStatus('Disconnected', 'disconnected');
            }
        }

        function clearMessages() {
            document.getElementById('messages').innerHTML = '';
            messageCount = 0;
            document.getElementById('messageCount').textContent = '0';
        }

        // 页面卸载时断开连接
        window.addEventListener('beforeunload', disconnect);
    </script>
</body>
</html>
